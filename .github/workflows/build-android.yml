name: Build Android APK

on:
  push:
    branches:
      - feature/CI-CD
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set EAS Secrets
        run: |
          eas env:create --scope project --name EXPO_PUBLIC_API_BASE_URL --value "${{ secrets.BACKEND_URL }}/v1" --type string --visibility secret --environment production --non-interactive --force
          eas env:create --scope project --name EXPO_PUBLIC_ALT_API_BASE_URL --value "${{ secrets.BACKEND_URL }}" --type string --visibility secret --environment production --non-interactive --force

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK URL
        id: get_url
        run: |
          BUILD_URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "apk_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "APK Build #${{ github.run_number }}"
          body: |
            ## APK Android lista para instalar

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Cómo instalar en Android
            1. Descarga el `.apk` desde los assets de abajo
            2. Ajustes → Seguridad → Activar "Fuentes desconocidas"
            3. Abre el archivo e instala

            ### Link directo EAS
            ${{ steps.get_url.outputs.apk_url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
